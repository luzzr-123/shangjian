<?xml version="1.0" standalone="no"?>
<svg id="master-icon" width="200" height="200" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <!-- 鎺屾帶锛氬洓瑙掓敹鏉熸鏋?(娣辫壊锛岀粷瀵圭殑鍔涢噺鎰熶笌绋冲畾) -->
                <g stroke="#0F172A" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" fill="none">
                    <!-- 宸︿笂 -->
                    <path d="M 30 20 L 20 20 L 20 30"/>
                    <!-- 鍙充笂 -->
                    <path d="M 90 20 L 100 20 L 100 30"/>
                    <!-- 宸︿笅 -->
                    <path d="M 20 90 L 20 100 L 30 100"/>
                    <!-- 鍙充笅 -->
                    <path d="M 100 90 L 100 100 L 90 100"/>
                </g>

                <g class="">
                    <!-- 鐔靛噺闃舵 1锛氭贩涔变笌鏃犲簭 (澶栧洿锛屾祬鐏帮紝澶ч棿闅旇櫄绾? -->
                    <circle cx="60" cy="60" r="36" fill="none" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="2 12" stroke-linecap="round"/>
                    
                    <!-- 鐔靛噺闃舵 2锛氳仛鎷笌缁勭粐 (涓湀锛屼腑鐏帮紝瀵嗛泦鐨勮櫄绾? -->
                    <circle cx="60" cy="60" r="26" fill="none" stroke="#94A3B8" stroke-width="2.5" stroke-dasharray="10 5" stroke-linecap="round"/>
                    
                    <!-- 鐔靛噺闃舵 3锛氬缓绔嬬З搴?(鍐呭湀锛岃摑鑹插疄绾匡紝缁濆杩炵画) -->
                    <circle cx="60" cy="60" r="14" fill="none" stroke="#3B82F6" stroke-width="3"/>
                    
                    <!-- 鏍稿績锛氭瀬鑷存帉鎺т笌缁濆浣庣喌鐘舵€?(涓績瀹炲績鏍革紝娣遍們钃? -->
                    <circle cx="60" cy="60" r="6" fill="#2563EB"/>
                </g>
            </svg>
